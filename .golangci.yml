version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (io.Closer).Close
        - (*os.File).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
