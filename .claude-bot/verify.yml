commands:
  - name: schema-drift
    cmd: "tmpdir=\"$(mktemp -d)\"; git clone --quiet --filter=blob:none --no-checkout https://github.com/WasmAgent/wasmagent-js.git \"$tmpdir/wasmagent-js\"; git -C \"$tmpdir/wasmagent-js\" checkout --quiet 51a0b036efeb9189123aa46d358a5ed18ea7824c -- packages/compliance/schemas; cmp -s schemas/constraint-ir.schema.json \"$tmpdir/wasmagent-js/packages/compliance/schemas/constraint-ir.schema.json\" && cmp -s schemas/constraint-violation.schema.json \"$tmpdir/wasmagent-js/packages/compliance/schemas/constraint-violation.schema.json\""
    timeout: 3m
    level: 1
  - name: build
    cmd: go build ./...
    timeout: 5m
    level: 1
  - name: golangci-lint
    cmd: "if [ -f .golangci.yml ] || [ -f .golangci.yaml ]; then export PATH=\"$PATH:/usr/local/go/bin:/home/dev/go/bin:$(go env GOPATH)/bin\"; export GOLANGCI_LINT_CACHE=\"$(mktemp -d)\"; command -v golangci-lint >/dev/null 2>&1 || go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest; golangci-lint run --allow-serial-runners --timeout 10m ./...; else echo \"no .golangci.yml, skipping\"; fi"
    timeout: 15m
    level: 2
  - name: test
    cmd: go test -short -timeout 300s ./...
    timeout: 8m
    level: 3
  - name: staticcheck-all
    cmd: "export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin:/usr/local/go/bin:/home/dev/go/bin; staticcheck -checks all ./..."
    timeout: 5m
    level: 4
